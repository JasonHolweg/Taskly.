<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
  <meta name="theme-color" content="#F5F5F7" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Taskly">
  <title>Taskly — eine Sache, die du jetzt machen kannst</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/assets/img/tanuki.svg">
  <link rel="icon" href="/assets/img/tanuki.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body>

<!-- ============ AUTH ============ -->
<section id="auth" class="auth hidden">
  <div class="auth-card">
    <img src="/assets/img/tanuki.svg" alt="Taskly Tanuki" class="tanuki tanuki-lg">
    <h1 class="brand">Taskly</h1>
    <p class="muted">Eine Sache, die du jetzt machen kannst.</p>

    <div class="seg" role="tablist">
      <button class="seg-btn is-active" data-auth-tab="login">Anmelden</button>
      <button class="seg-btn" data-auth-tab="register">Neu hier</button>
    </div>

    <form id="form-login" class="auth-form">
      <input type="email" name="email" placeholder="E-Mail" autocomplete="email" required>
      <input type="password" name="password" placeholder="Passwort" autocomplete="current-password" required>
      <button class="btn btn-primary btn-block" type="submit">Anmelden</button>
    </form>

    <form id="form-register" class="auth-form hidden">
      <input type="text" name="name" placeholder="Dein Name" autocomplete="name" required>
      <input type="email" name="email" placeholder="E-Mail" autocomplete="email" required>
      <input type="password" name="password" placeholder="Passwort (≥6 Zeichen)" autocomplete="new-password" required>
      <input type="text" name="invite_code" placeholder="Einladungscode (optional)" autocomplete="off">
      <button class="btn btn-primary btn-block" type="submit">Los geht’s</button>
    </form>

    <p id="auth-error" class="error"></p>
  </div>
</section>

<!-- ============ APP ============ -->
<div id="app" class="app hidden">
  <!-- Header: Fortschritt -->
  <header class="topbar">
    <div class="progress-cluster">
      <div class="xp-ring" id="xp-ring" style="--p:0">
        <span class="xp-level" id="xp-level">1</span>
      </div>
      <div class="streak" id="streak" title="Streak">
        <span class="streak-flame">🔥</span><span id="streak-count">0</span>
      </div>
    </div>
    <div class="brand-mini">Taskly</div>
    <div class="right-cluster">
      <div class="sparks" title="Sparks">
        <span class="spark-ico">✦</span><span id="spark-count">0</span>
      </div>
      <button class="icon-btn" id="theme-toggle" title="Theme">◐</button>
    </div>
  </header>

  <main class="content">

    <!-- Brain-Dump -->
    <section class="card braindump">
      <h2 class="h3">Kopf leeren</h2>
      <p class="muted small">Schreib alles rein, was dir durch den Kopf geht — Taskly sortiert es.</p>
      <textarea id="dump-text" rows="3" placeholder="z.B. Bad putzen, Mama anrufen, Steuerordner sortieren …"></textarea>
      <div class="braindump-actions">
        <button class="btn btn-ghost" id="dump-voice" title="Sprechen" hidden>🎙️ Sprechen</button>
        <button class="btn btn-primary" id="dump-save">Erfassen</button>
      </div>
      <p class="dump-result muted small" id="dump-result"></p>
    </section>

    <!-- Was jetzt? -->
    <section class="hero">
      <div class="quick">
        <div class="quick-group" id="q-time" data-key="time">
          <span class="quick-label">Zeit</span>
          <button class="pill" data-val="10">10</button>
          <button class="pill is-active" data-val="30">30</button>
          <button class="pill" data-val="60">60 Min</button>
        </div>
        <div class="quick-group" id="q-energy" data-key="energy">
          <span class="quick-label">Akku</span>
          <button class="pill" data-val="müde">müde</button>
          <button class="pill is-active" data-val="ok">ok</button>
          <button class="pill" data-val="voll">voll</button>
        </div>
      </div>

      <!-- Startzustand -->
      <div class="hero-card" id="hero-start">
        <img src="/assets/img/tanuki.svg" alt="" class="tanuki tanuki-md">
        <button class="btn btn-primary btn-hero" id="btn-whatnow">Was jetzt?</button>
        <p class="muted small">Eine Sache. Kein Stress.</p>
      </div>

      <!-- Pick -->
      <div class="hero-card pick hidden" id="hero-pick">
        <div class="pick-reason"><img src="/assets/img/tanuki.svg" alt="" class="tanuki tanuki-sm"><span id="pick-reason"></span></div>
        <h2 class="display" id="pick-title">—</h2>
        <div class="pick-meta" id="pick-meta"></div>
        <div class="pick-actions">
          <button class="btn btn-primary btn-block" id="act-done">Erledigt</button>
          <div class="pick-secondary">
            <button class="btn btn-ghost" id="act-skip">Überspringen</button>
            <button class="btn btn-ghost" id="act-snooze">Später</button>
          </div>
        </div>
      </div>

      <!-- Leerzustand -->
      <div class="hero-card empty hidden" id="hero-empty">
        <img src="/assets/img/tanuki.svg" alt="" class="tanuki tanuki-md tanuki-calm">
        <p id="empty-msg" class="empty-msg">Nichts dringend. Genieß die Pause. 🍵</p>
        <button class="btn btn-ghost" id="empty-again">Nochmal schauen</button>
      </div>
    </section>
  </main>

  <!-- Belohnungs-Pop -->
  <div class="reward-overlay hidden" id="reward">
    <div class="reward-card">
      <div class="confetti" id="confetti"></div>
      <img src="/assets/img/tanuki.svg" alt="" class="tanuki tanuki-lg tanuki-happy">
      <div class="reward-xp" id="reward-xp">+0 XP</div>
      <p class="reward-msg" id="reward-msg"></p>
      <div class="reward-extra" id="reward-extra"></div>
      <button class="btn btn-primary" id="reward-close">Weiter</button>
    </div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-item is-active">Heute</button>
    <button class="nav-item" data-soon>Plan</button>
    <button class="nav-item" data-soon>Shop</button>
    <button class="nav-item" id="nav-more">Mehr</button>
  </nav>
</div>

<script src="/assets/js/app.js"></script>
</body>
</html>
